<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find a Doctor | HealthCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles_Doctor.css">
</head>
<body>
  <header>
    <div class="nav-top">
      <div class="left">
        <div class="logo">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/heart-with-pulse.png" alt="Logo" />
          <span>HealthCare</span>
        </div>
        <div id="locationSection" class="location" tabindex="0" aria-label="User location">
          <img src="https://img.icons8.com/ios-filled/24/ffffff/marker.png" alt="Location" />
          <span id="locationText">Your Location</span>
        </div>
      </div>
      <div class="right">
        <div class="offer-logo">
          <img src="https://img.icons8.com/ios-filled/24/ffffff/sale.png" alt="Offer" />
          <span>Special Offer</span>
        </div>
        <div class="login" tabindex="0" role="link" aria-label="Login page" onclick="window.location='login.html'">Log In</div>
      </div>
    </div>
    <nav class="nav-bottom" aria-label="Primary">
      <a href="indexMainpage.Html">Home</a>
      <a href="Find_Doctor.html">Doctor</a>
      <a href="Find_Hospital.html">Hospital</a>
      <a href="medicine.html">Medicine</a>
      <a href="emergency.html">Emergency</a>
    </nav>
  </header>

  <main class="doctor-page-container">
    <div id="loadingIndicator" class="loading-indicator">
      <div class="spinner"><i class="fas fa-spinner fa-spin"></i></div>
      <p>Loading doctors...</p>
    </div>

    <h1 class="section-title">Find the Right Doctor for You</h1>
    
    <div class="doctor-search-container">
      <h2>Search Filters</h2>
      <form id="doctorSearchForm">
        <div class="search-filters">
          <div class="filter-group">
            <label for="specialty"><i class="fas fa-briefcase-medical"></i> Specialty</label>
            <select id="specialty" name="specialty">
              <option value="">All Specialties</option>
              <!-- Options will be populated by JavaScript -->
            </select>
          </div>
          
          <div class="filter-group">
            <label for="location"><i class="fas fa-map-marker-alt"></i> Location</label>
            <select id="location" name="location">
              <option value="">All Locations</option>
              <!-- Options will be populated by JavaScript -->
            </select>
          </div>
          
          <div class="filter-group">
            <label for="language"><i class="fas fa-language"></i> Language</label>
            <select id="language" name="language">
              <option value="">Any Language</option>
              <!-- Options will be populated by JavaScript -->
            </select>
          </div>
          
          <div class="filter-group">
            <label for="insurance"><i class="fas fa-shield-alt"></i> Insurance</label>
            <select id="insurance" name="insurance">
              <option value="">Any Insurance</option>
              <!-- Options will be populated by JavaScript -->
            </select>
          </div>
        </div>
        
        <button type="submit" class="search-button">
          <i class="fas fa-search"></i> Search Doctors
        </button>
      </form>
    </div>
    
    <div class="results-count">
      <h3>0 Doctors Available</h3>
    </div>
    
    <div class="doctors-grid" id="doctorsGrid">
      <!-- Doctor cards will be inserted here by JavaScript -->
    </div>

    <!-- Doctor Details Modal -->
    <div id="doctorModal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="doctorDetails"></div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2023 HealthCare. All rights reserved.</p>
  </footer>

  <script src="script_Doctor.js"></script>
</body>
</html>
