<!DOCTYPE html>
<html lang="en">

<body>
  <header>
    <div class="nav-top">

        <div class="logo">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/heart-with-pulse.png" alt="Logo" />

        </div>
        <div id="locationSection" class="location" tabindex="0" aria-label="User location">

          <span id="locationText">Your Location</span>
        </div>
      </div>
      <div class="right">
        <div class="offer-logo" onclick="window.location='Special_Offer.html'" tabindex="0" role="link" aria-label="Special Offer page">

      <a href="indexMainpage.Html">Home</a>

    <h1 class="section-title">Special Offers</h1>
    
    <div class="doctor-search-container" style="text-align: center; padding: 3rem;">
      <i class="fas fa-gift coming-soon-icon" style="font-size: 4rem; color: var(--magenta); margin-bottom: 1rem;"></i>
      <h2 style="font-size: 2rem; margin-bottom: 1rem;">No offers right now!</h2>
      <p style="font-size: 1.2rem; color: var(--dark-teal); max-width: 600px; margin: 0 auto;">

        Please stay tuned – something special is on the way!

    <p>&copy; 2023 HealthCare. All rights reserved.</p>
