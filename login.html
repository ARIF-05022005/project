<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log In | HealthCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles_Login.css">
</head>
<body>
  <header>
    <div class="nav-top">
      <div class="left">
        <div class="logo">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/heart-with-pulse.png" alt="Logo" />
          <span>HealthCare</span>
      </div>
    </div>
  </header>
  <main class="login-page-container">
    <h1 class="section-title">Log In to Your Account</h1>
    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="email"><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <div class="password-wrapper">
  <div class="password-field">
  <input type="password" id="loginPassword" name="password" placeholder="Password" required>
  <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
  </div>
</div>
      </div>
      <button type="submit" class="login-button">Log In</button>
      <p class="signup-text">Don't have an account? <a href="signup.html">Sign up here</a></p>
      <p id="loginMessage" class="login-message"></p>
    </form>
    <script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault(); // stop actual form submission
    // You could add validation here
    window.location.href = 'indexMainpage.html'; // redirect to home page
  });
</script>
  </main>
  <footer>
    <p>&copy; 2024 HealthCare. All rights reserved.</p>
  </footer>
  <script>
  function togglePassword(inputId, icon) {
    const passwordInput = document.getElementById(inputId);
    if (passwordInput.type === "password") {
      passwordInput.type = "text";
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      passwordInput.type = "password";
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    window.location.href = 'indexMainpage.html';
  });
</script>
</body>
</html>
